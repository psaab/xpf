groups {
    node0 {
        system {
            host-name xpf-userspace-fw0;
        }
        chassis {
            cluster {
                node 0;
                peer-address 10.99.12.2;
                fabric-peer-address 10.99.13.2;
            }
        }
        interfaces {
            fxp0 {
                unit 0 { family inet { dhcp; } }
            }
            em0 {
                unit 0 { family inet { address 10.99.12.1/30; } }
            }
            fab0 {
                unit 0 { family inet { address 10.99.13.1/30; } }
            }
            ge-0/0/1 {
                gigether-options { redundant-parent reth1; }
            }
            ge-0/0/2 {
                gigether-options { redundant-parent reth0; }
            }
        }
    }
    node1 {
        system {
            host-name xpf-userspace-fw1;
        }
        chassis {
            cluster {
                node 1;
                peer-address 10.99.12.1;
                fabric-peer-address 10.99.13.1;
            }
        }
        interfaces {
            fxp0 {
                unit 0 { family inet { dhcp; } }
            }
            em0 {
                unit 0 { family inet { address 10.99.12.2/30; } }
            }
            fab1 {
                unit 0 { family inet { address 10.99.13.2/30; } }
            }
            ge-7/0/1 {
                gigether-options { redundant-parent reth1; }
            }
            ge-7/0/2 {
                gigether-options { redundant-parent reth0; }
            }
        }
    }
}
apply-groups "${node}";
chassis {
    cluster {
        cluster-id 22;
        reth-count 2;
        heartbeat-interval 200;
        heartbeat-threshold 5;
        control-interface em0;
        configuration-synchronize;
        redundancy-group 0 {
            node 0 priority 200;
            node 1 priority 100;
        }
        redundancy-group 1 {
            node 0 priority 200;
            node 1 priority 100;
            gratuitous-arp-count 8;
            interface-monitor {
                ge-0/0/2 weight 255;
                ge-7/0/2 weight 255;
            }
        }
        redundancy-group 2 {
            node 0 priority 200;
            node 1 priority 100;
            gratuitous-arp-count 8;
            interface-monitor {
                ge-0/0/1 weight 255;
                ge-7/0/1 weight 255;
            }
        }
    }
}
interfaces {
    fab0 {
        fabric-options {
            member-interfaces {
                ge-0/0/0;
            }
        }
    }
    fab1 {
        fabric-options {
            member-interfaces {
                ge-7/0/0;
            }
        }
    }
    reth0 {
        redundant-ether-options { redundancy-group 1; }
        vlan-tagging;
        unit 50 {
            vlan-id 50;
            family inet { address 172.16.50.8/24; }
            family inet6 { address 2001:559:8585:50::8/64; }
        }
        unit 80 {
            vlan-id 80;
            family inet { address 172.16.80.8/24; }
            family inet6 { address 2001:559:8585:80::8/64; }
        }
    }
    reth1 {
        redundant-ether-options { redundancy-group 2; }
        unit 0 {
            family inet {
                filter { input sfmix-pbr; }
                address 10.0.61.1/24;
            }
            family inet6 { address 2001:559:8585:ef00::1/64; }
        }
    }
    gr-0/0/0 {
        tunnel {
            source 2001:559:8585:80::8;
            destination 2602:ffd3:0:2::7;
        }
        unit 0 {
            family inet { address 10.255.192.42/30; }
        }
    }
}
security {
    flow { allow-dns-reply; allow-embedded-icmp; }
    zones {
        security-zone mgmt {
            interfaces { fxp0; }
            host-inbound-traffic { system-services { ssh; ping; } }
        }
        security-zone control {
            interfaces { em0; fab0; fab1; }
            host-inbound-traffic { system-services { all; } }
        }
        security-zone wan {
            interfaces { reth0.50; reth0.80; }
            host-inbound-traffic {
                system-services { ping; gre; }
                protocols { router-discovery; }
            }
        }
        security-zone sfmix {
            interfaces { gr-0/0/0.0; }
            host-inbound-traffic {
                system-services { ping; }
            }
        }
        security-zone lan {
            interfaces { reth1; }
            host-inbound-traffic {
                system-services { ssh; ping; }
                protocols { router-discovery; }
            }
        }
    }
    policies {
        default-policy deny-all;
        from-zone lan to-zone wan {
            policy allow-all {
                match { source-address any; destination-address any; application any; }
                then { permit; log { session-init; session-close; } }
            }
        }
        from-zone lan to-zone sfmix {
            policy allow-all {
                match { source-address any; destination-address any; application any; }
                then { permit; log { session-init; session-close; } }
            }
        }
    }
    nat {
        source {
            rule-set lan-to-wan {
                from zone lan;
                to zone wan;
                rule snat {
                    match { source-address 0.0.0.0/0; }
                    then { source-nat { interface; } }
                }
                rule snat6 {
                    match { source-address ::/0; }
                    then { source-nat { interface; } }
                }
            }
            rule-set lan-to-sfmix {
                from zone lan;
                to zone sfmix;
                rule snat {
                    match { source-address 0.0.0.0/0; }
                    then { source-nat { interface; } }
                }
            }
        }
    }
}
protocols {
    router-advertisement {
        interface reth1 {
            default-lifetime 180;
            max-advertisement-interval 30;
            min-advertisement-interval 10;
            prefix 2001:559:8585:ef00::/64 {
                on-link;
                autonomous;
            }
            dns-server-address 2001:4860:4860::8888;
        }
    }
}
routing-options {
    static {
        route 0.0.0.0/0 { next-hop 172.16.50.1; }
        route ::/0 { next-hop 2001:559:8585:50::1; }
        route 2602:ffd3:0:2::/64 { next-hop 2001:559:8585:80::1; }
    }
}
firewall {
    family inet {
        filter sfmix-pbr {
            term sfmix-route {
                from {
                    destination-address 10.255.192.40/30;
                }
                then {
                    routing-instance sfmix;
                }
            }
            term default {
                then accept;
            }
        }
    }
}
routing-instances {
    sfmix {
        instance-type virtual-router;
        interface gr-0/0/0.0;
        routing-options {
            static {
                route 0.0.0.0/0 { next-hop 10.255.192.41; }
            }
        }
    }
}
system {
    name-server {
        1.1.1.1;
    }
    services {
        dhcp-local-server {
            group lan-pool {
                interface reth1.0;
                pool lan-range {
                    subnet 10.0.61.0/24;
                    address-range low 10.0.61.100 high 10.0.61.199;
                    router 10.0.61.1;
                    dns-server 8.8.8.8;
                }
            }
        }
    }
    dataplane-type userspace;
    dataplane {
        binary /usr/local/sbin/xpf-userspace-dp;
        control-socket /run/xpf/userspace-dp.sock;
        state-file /run/xpf/userspace-dp.json;
        workers 6;
        ring-entries 16384;
        poll-mode interrupt;
    }
}
